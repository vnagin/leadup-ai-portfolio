<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="FlockSense AI — Computer Vision для птицеводства">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F0D"/>
      <stop offset="1" stop-color="#0F1512"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#00E5C7" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00E5C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14F5D7"/>
      <stop offset="1" stop-color="#00CBB0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#FFFFFF" stroke-opacity="0.04">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- pill -->
  <g transform="translate(80,84)">
    <rect width="330" height="40" rx="20" fill="#00E5C7" fill-opacity="0.10" stroke="#00E5C7" stroke-opacity="0.30"/>
    <circle cx="26" cy="20" r="5" fill="#00E5C7"/>
    <text x="46" y="26" font-family="'Geist Mono',monospace" font-size="15" letter-spacing="2" fill="#00E5C7">AGTECH · COMPUTER VISION</text>
  </g>

  <!-- title -->
  <text x="80" y="290" font-family="'Geist',sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="#EDEFEE">FlockSense<tspan fill="url(#acc)"> AI</tspan></text>
  <text x="82" y="350" font-family="'Geist',sans-serif" font-size="34" font-weight="500" fill="#EDEFEE" fill-opacity="0.72">Цифровой двойник птицефабрики на компьютерном зрении</text>

  <!-- role chips -->
  <g font-family="'Geist Mono',monospace" font-size="20" fill="#EDEFEE" fill-opacity="0.62">
    <g transform="translate(80,430)"><rect width="230" height="48" rx="10" fill="#141B18" stroke="#FFFFFF" stroke-opacity="0.08"/><text x="24" y="31">Собственник</text></g>
    <g transform="translate(330,430)"><rect width="220" height="48" rx="10" fill="#141B18" stroke="#FFFFFF" stroke-opacity="0.08"/><text x="24" y="31">Зоотехник</text></g>
    <g transform="translate(570,430)"><rect width="270" height="48" rx="10" fill="#141B18" stroke="#FFFFFF" stroke-opacity="0.08"/><text x="24" y="31">Производство</text></g>
  </g>

  <!-- camera / vision mark -->
  <g transform="translate(940,150)" stroke="url(#acc)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="40" width="170" height="120" rx="18" stroke-opacity="0.9"/>
    <circle cx="85" cy="100" r="40"/>
    <circle cx="85" cy="100" r="14" fill="#00E5C7" stroke="none"/>
    <path d="M30 40 L52 8 H118 L140 40" stroke-opacity="0.9"/>
    <path d="M150 70 H188 M150 130 H188" stroke-opacity="0.35"/>
  </g>

  <!-- footer brand -->
  <text x="80" y="566" font-family="'Geist Mono',monospace" font-size="22" letter-spacing="1" fill="#EDEFEE" fill-opacity="0.45">LeadUp AI · Portfolio</text>
</svg>
