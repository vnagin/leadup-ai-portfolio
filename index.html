<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Portfolio — LeadUp AI</title>
  <meta name="description" content="LeadUp AI project portfolio — 8 AI-native applications built with React + Gemini API.">
  <meta name="theme-color" content="#0A1229">
  <link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicons/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap');
    :root {
      --teal: #00E5C7;
      --bg-1: #0A0F0D;
      --bg-2: #0F1512;
      --bg-3: #141B18;
      --fg-1: #EDEFEE;
      --fg-2: rgba(237,239,238,0.72);
      --fg-3: rgba(237,239,238,0.52);
      --border-1: rgba(255,255,255,0.06);
      --border-2: rgba(255,255,255,0.10);
      --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
      --ease: cubic-bezier(0.2,0,0,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:var(--bg-1);font-family:var(--font-sans);font-size:15px;line-height:1.5;color:var(--fg-1);-webkit-font-smoothing:antialiased}
    body{background:var(--bg-1);color:var(--fg-1);min-height:100vh;display:grid;place-items:center}
    .splash{text-align:center;padding:48px 24px}
    .mark{width:56px;height:56px;border-radius:14px;background:var(--teal);color:#061210;font-weight:900;font-family:var(--font-mono);font-size:34px;display:grid;place-items:center;margin:0 auto 32px}
    h1{font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:-0.035em;margin-bottom:12px}
    p{font-size:16px;color:var(--fg-2);max-width:420px;margin:0 auto 32px;line-height:1.55}
    .langs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
    .langs a{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;font-weight:600;padding:12px 24px;border-radius:100px;background:var(--bg-3);border:1px solid var(--border-1);color:var(--fg-1);text-decoration:none;transition:all 120ms var(--ease)}
    .langs a:hover{border-color:var(--teal);box-shadow:0 0 20px rgba(0,229,199,0.2);transform:translateY(-1px)}
    .langs a .flag{font-size:18px}
    .footer{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0.04em}
  </style>
  <script>
    var lang = (navigator.language || '').split('-')[0];
    var supported = { ru:'/ru/', en:'/en/', es:'/es/' };
    var target = supported[lang] || '/en/';
    if (window.location.pathname === '/' || window.location.pathname === '') {
      window.location.replace(target);
    }
  </script>
</head>
<body>
<div class="splash">
  <div class="mark">L</div>
  <h1>AI Portfolio</h1>
  <p>LeadUp AI project showcase — 8 AI-native applications built with React + Google Gemini API.</p>
  <div class="langs">
    <a href="/ru/"><span class="flag">&#127479;&#127482;</span> Русский</a>
    <a href="/en/"><span class="flag">&#127468;&#127463;</span> English</a>
    <a href="/es/"><span class="flag">&#127466;&#127480;</span> Español</a>
  </div>
</div>
<div class="footer">&copy; 2026 LeadUp AI</div>
</body>
</html>
